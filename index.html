<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkExpress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Outfit:wght@300;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --mouse-x: 50%;
            --mouse-y: 50%;
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --text-main: #fcfcfc;
            --text-muted: #a1a1aa;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --card-inner-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --font-family: 'Tajawal', 'Outfit', sans-serif;
            --bento-gap: 20px;
            --bento-radius: 28px;
            --grain-opacity: 0.04;
            --gradient-spot: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        }

        body.light-mode {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-border: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
            --card-inner-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 1);
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.15);
            --font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif;
            --grain-opacity: 0.02;
            --gradient-spot: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.08) 0%, transparent 60%);
        }

        body.neomorph-mode {
            --bg-base: #e2e8f0;
            --bg-surface: #e2e8f0;
            --text-main: #334155;
            --text-muted: #94a3b8;
            --card-border: transparent;
            --card-shadow: 12px 12px 24px #c1c9d2, -12px -12px 24px #ffffff;
            --card-inner-shadow: none;
            --accent: #8b5cf6;
            --accent-glow: transparent;
            --font-family: 'Tajawal', 'Outfit', sans-serif;
            --bento-radius: 36px;
            --grain-opacity: 0;
            --gradient-spot: none;
        }

        body.matrix-mode {
            --bg-base: #010301;
            --bg-surface: #030803;
            --text-main: #22c55e;
            --text-muted: #15803d;
            --card-border: rgba(34, 197, 94, 0.2);
            --card-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            --card-inner-shadow: inset 0 0 15px rgba(34, 197, 94, 0.05);
            --accent: #4ade80;
            --accent-glow: rgba(74, 222, 128, 0.2);
            --font-family: 'Fira Code', monospace;
            --bento-radius: 4px;
            --grain-opacity: 0.08;
            --gradient-spot: radial-gradient(circle at center, rgba(34, 197, 94, 0.05) 0%, transparent 70%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-base);
            background-image: var(--gradient-spot);
            background-repeat: no-repeat;
            background-size: 100vw 100vh;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.6s ease, color 0.6s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: overlay;
        }

        .matrix-mode::after {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            opacity: 1;
            mix-blend-mode: normal;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3rem 2rem 1rem;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
            box-shadow: var(--card-shadow), var(--card-inner-shadow);
        }

        .neomorph-mode .brand-icon {
            box-shadow: 6px 6px 12px #c1c9d2, -6px -6px 12px #ffffff;
        }

        .brand-text {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-main) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .matrix-mode .brand-text {
            -webkit-text-fill-color: var(--text-main);
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
            letter-spacing: 0.1em;
        }

        #theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: var(--bg-surface);
            color: var(--text-main);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--card-shadow), var(--card-inner-shadow);
            position: relative;
            overflow: hidden;
        }

        #theme-toggle::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #theme-toggle i {
            position: relative;
            z-index: 2;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #theme-toggle:hover i {
            transform: scale(1.15) rotate(15deg);
        }

        #theme-toggle:hover::before {
            opacity: 0.1;
        }

        .neomorph-mode #theme-toggle {
            box-shadow: 6px 6px 12px #c1c9d2, -6px -6px 12px #ffffff;
            border: none;
        }

        .neomorph-mode #theme-toggle:active {
            box-shadow: inset 4px 4px 8px #c1c9d2, inset -4px -4px 8px #ffffff;
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            z-index: 10;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 180px;
            gap: var(--bento-gap);
            width: 100%;
        }

        .hub:has(.app:hover) .app:not(:hover) {
            opacity: 0.6;
            transform: scale(0.98);
        }

        .app {
            background: var(--bg-surface);
            border: 1px solid var(--card-border);
            border-radius: var(--bento-radius);
            position: relative;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--card-shadow), var(--card-inner-shadow);
            isolation: isolate;
        }

        .neomorph-mode .app {
            border: none;
        }
        
        .neomorph-mode .app:hover {
            box-shadow: inset 8px 8px 16px #c1c9d2, inset -8px -8px 16px #ffffff;
        }

        .matrix-mode .app:hover {
            background: rgba(34, 197, 94, 0.05);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2), inset 0 0 15px rgba(34, 197, 94, 0.1);
        }

        .app:not(.neomorph-mode):not(.matrix-mode)::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), var(--accent-glow), transparent 40%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: -1;
        }

        .app:hover::before {
            opacity: 1;
        }

        .app-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            padding: 2.25rem;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .app:not(.neomorph-mode):hover .app-content {
            transform: translateY(-4px);
        }

        .app-icon {
            font-size: 2.5rem;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .app:hover .app-icon {
            color: var(--accent);
            transform: scale(1.1);
        }

        .neomorph-mode .app:hover .app-icon {
            transform: scale(0.95);
        }

        .app-details {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .app-name {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1.2;
        }

        .app-link-icon {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0;
            transform: translate(10px, 10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--card-border);
        }

        .light-mode .app-link-icon {
            background: rgba(0, 0, 0, 0.03);
        }

        .neomorph-mode .app-link-icon {
            background: transparent;
            box-shadow: 3px 3px 6px #c1c9d2, -3px -3px 6px #ffffff;
            border: none;
        }

        .app:hover .app-link-icon {
            opacity: 1;
            transform: translate(0, 0);
            color: var(--accent);
        }

        .b-large {
            grid-column: span 2;
            grid-row: span 2;
        }
        .b-large .app-content {
            flex-direction: column;
            justify-content: space-between;
        }
        .b-large .app-icon {
            font-size: 4rem;
            margin-bottom: auto;
            color: var(--accent);
        }
        .b-large .app-name {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .b-wide {
            grid-column: span 2;
            grid-row: span 1;
        }
        .b-wide .app-content {
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            gap: 2rem;
        }
        .b-wide .app-icon {
            font-size: 2.75rem;
        }
        .b-wide .app-name {
            font-size: 1.5rem;
        }

        .b-tall {
            grid-column: span 1;
            grid-row: span 2;
        }
        .b-tall .app-content {
            flex-direction: column;
            justify-content: space-between;
        }
        .b-tall .app-icon {
            font-size: 3.5rem;
        }
        .b-tall .app-name {
            font-size: 1.5rem;
        }

        .b-std {
            grid-column: span 1;
            grid-row: span 1;
        }
        .b-std .app-content {
            flex-direction: column;
            justify-content: space-between;
        }
        .b-std .app-icon {
            font-size: 2.25rem;
        }
        .b-std .app-name {
            font-size: 1.25rem;
        }

        @media (max-width: 1024px) {
            .bento-grid {
                grid-template-columns: repeat(3, 1fr);
                grid-auto-flow: dense;
            }
            .b-large { grid-column: span 2; grid-row: span 2; }
            .b-wide { grid-column: span 2; }
            .b-tall { grid-column: span 1; }
        }

        @media (max-width: 768px) {
            header { padding: 2rem 1.5rem 1rem; }
            main { padding: 1.5rem; }
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
                grid-auto-rows: 160px;
            }
            .b-large { grid-column: span 2; grid-row: span 2; }
            .b-wide { grid-column: span 2; grid-row: span 1; }
            .b-tall { grid-column: span 1; grid-row: span 1; }
            .b-tall .app-content { flex-direction: row; align-items: center; justify-content: flex-start; gap: 1.5rem; }
            .b-tall .app-icon { font-size: 2.25rem; margin-bottom: 0; }
            .b-std { grid-column: span 1; }
            
            .app-link-icon { display: none; }
        }

        @media (max-width: 480px) {
            header { padding: 1.5rem 1rem 0.5rem; }
            main { padding: 1rem; }
            .brand-text { font-size: 1.5rem; }
            .brand-icon { width: 40px; height: 40px; font-size: 1.25rem; }
            #theme-toggle { width: 40px; height: 40px; font-size: 1rem; }

            .bento-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: auto;
                gap: 1rem;
            }
            .b-large, .b-wide, .b-tall, .b-std {
                grid-column: span 1;
                grid-row: span 1;
            }
            .app-content {
                flex-direction: row !important;
                justify-content: flex-start !important;
                align-items: center !important;
                padding: 1.5rem !important;
                gap: 1.25rem !important;
            }
            .app-icon { font-size: 2rem !important; margin-bottom: 0 !important; }
            .b-large .app-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-layer-group"></i></div>
            <div class="brand-text">LinkExpress</div>
        </div>
        <button id="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <main>
        <div class="hub bento-grid">
            <a href="https://lx-index.vercel.app/" class="app b-large" target="_blank" rel="noopener noreferrer">
                <div class="app-link-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-book-medical"></i></div>
                    <div class="app-details">
                        <div class="app-name">فهرس الادوية</div>
                    </div>
                </div>
            </a>
            
            <a href="https://menu2-six.vercel.app/" class="app b-wide" target="_blank" rel="noopener noreferrer">
                <div class="app-link-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-pills"></i></div>
                    <div class="app-details">
                        <div class="app-name">مجموعات دوائية</div>
                    </div>
                </div>
            </a>

            <a href="https://datakid-github-io.vercel.app/" class="app b-std" target="_blank" rel="noopener noreferrer">
                <div class="app-link-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-briefcase-medical"></i></div>
                    <div class="app-details">
                        <div class="app-name">خارجي 1</div>
                    </div>
                </div>
            </a>

            <a href="https://searchbar-five-beta.vercel.app/" class="app b-tall" target="_blank" rel="noopener noreferrer">
                <div class="app-link-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-search"></i></div>
                    <div class="app-details">
                        <div class="app-name">لستة الادوية</div>
                    </div>
                </div>
            </a>

            <a href="https://protocols-one.vercel.app/" class="app b-wide" target="_blank" rel="noopener noreferrer">
                <div class="app-link-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-folder-open"></i></div>
                    <div class="app-details">
                        <div class="app-name">بروتوكولات التأمين</div>
                    </div>
                </div>
            </a>

            <a href="https://datakid2.vercel.app/" class="app b-std" target="_blank" rel="noopener noreferrer">
                <div class="app-link-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-graduation-cap"></i></div>
                    <div class="app-details">
                        <div class="app-name">خارجي 3</div>
                    </div>
                </div>
            </a>

            <a class="app b-wide" id="dual-link-1" style="cursor: pointer;">
                <div class="app-link-icon"><i class="fas fa-random"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="app-details">
                        <div class="app-name">المنفذ والتحمل</div>
                    </div>
                </div>
            </a>

            <a href="https://simpledashboard21.netlify.app/" class="app b-wide" target="_blank" rel="noopener noreferrer">
                <div class="app-link-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-eye"></i></div>
                    <div class="app-details">
                        <div class="app-name">بيانات الخارجي</div>
                    </div>
                </div>
            </a>
        </div>
    </main>

    <script>
        const themes =['dark', 'light', 'neomorph', 'matrix'];
        const icons =['fa-moon', 'fa-sun', 'fa-shapes', 'fa-terminal'];
        let currentTheme = 0;

        const applyTheme = () => {
            const theme = themes[currentTheme];
            document.body.className = `${theme}-mode`;
            document.querySelector('#theme-toggle i').className = `fas ${icons[currentTheme]}`;
        };

        document.getElementById('theme-toggle').addEventListener('click', () => {
            currentTheme = (currentTheme + 1) % themes.length;
            applyTheme();
        });

        document.querySelectorAll('.app').forEach(app => {
            app.addEventListener('mousemove', e => {
                if(document.body.classList.contains('neomorph-mode') || document.body.classList.contains('matrix-mode')) return;
                const rect = app.getBoundingClientRect();
                app.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                app.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
        });

        const dualUrls =['https://newlist2.vercel.app/', 'https://newlist-eta.vercel.app/'];
        document.getElementById('dual-link-1').addEventListener('click', () => {
            window.open(dualUrls[Math.floor(Math.random() * dualUrls.length)], '_blank', 'noopener,noreferrer');
        });

        applyTheme();
    </script>
</body>
</html>
