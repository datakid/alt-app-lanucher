<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkExpress Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&family=Almarai:wght@400;700;800&family=Outfit:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        [data-theme="dark"] {
            --font-main: 'Outfit', 'Alexandria', sans-serif;
            --bg-body: #050507;
            --bg-card: rgba(255,255,255,0.02);
            --text-main: #ffffff;
            --text-muted: #8b8b99;
            --accent: #7a88ff;
            --border-card: rgba(255,255,255,0.05);
            --radius-card: 24px;
            --shadow-card: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            --dock-bg: rgba(15,15,20,0.6);
            --dock-border: rgba(255,255,255,0.08);
            --dock-indicator: rgba(255,255,255,0.12);
            --dock-icon: #fff;
            --dock-icon-inactive: #555;
            --icon-bg: rgba(255,255,255,0.03);
            --ambient-bg: radial-gradient(circle at 15% 0%, rgba(122,136,255,0.12) 0%, transparent 40%),
                          radial-gradient(circle at 85% 100%, rgba(147,51,234,0.1) 0%, transparent 40%);
            --bg-size: cover;
        }

        [data-theme="light"] {
            --font-main: 'Alexandria', sans-serif;
            --bg-body: #ede8da;
            --bg-card: #faf7f2;
            --text-main: #1a1a1a;
            --text-muted: #777777;
            --accent: #c0392b;
            --border-card: #1a1a1a;
            --radius-card: 6px;
            --shadow-card: 4px 4px 0px #1a1a1a;
            --dock-bg: #1a1a1a;
            --dock-border: #1a1a1a;
            --dock-indicator: #c0392b;
            --dock-icon: #faf7f2;
            --dock-icon-inactive: #666666;
            --icon-bg: #ede8da;
            --ambient-bg: radial-gradient(circle, rgba(26,26,26,0.07) 1px, transparent 1px);
            --bg-size: 22px 22px;
        }

        [data-theme="neomorph"] {
            --font-main: 'Almarai', sans-serif;
            --bg-body: #dce4ed;
            --bg-card: #dce4ed;
            --text-main: #3a5068;
            --text-muted: #7a96b0;
            --accent: #3e82f7;
            --border-card: transparent;
            --radius-card: 28px;
            --shadow-card: 8px 8px 18px #bdc8d4, -8px -8px 18px #fbfeff;
            --dock-bg: #dce4ed;
            --dock-border: transparent;
            --dock-indicator: #dce4ed;
            --dock-icon: #3e82f7;
            --dock-icon-inactive: #7a96b0;
            --icon-bg: transparent;
            --ambient-bg: none;
            --bg-size: cover;
        }

        [data-theme="terminal"] {
            --font-main: 'Space Mono', monospace;
            --bg-body: #07071a;
            --bg-card: #0d0d22;
            --text-main: #d4ccff;
            --text-muted: #38386a;
            --accent: #a78bfa;
            --border-card: rgba(167,139,250,0.1);
            --radius-card: 0px;
            --shadow-card: none;
            --dock-bg: rgba(7,7,26,0.92);
            --dock-border: rgba(167,139,250,0.28);
            --dock-indicator: rgba(167,139,250,0.14);
            --dock-icon: #a78bfa;
            --dock-icon-inactive: #28285a;
            --icon-bg: rgba(167,139,250,0.05);
            --ambient-bg:
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(167,139,250,0.016) 3px, rgba(167,139,250,0.016) 4px),
                radial-gradient(ellipse at 15% 0%, rgba(167,139,250,0.15) 0%, transparent 52%),
                radial-gradient(ellipse at 90% 100%, rgba(251,146,60,0.1) 0%, transparent 44%);
            --bg-size: auto;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            background-image: var(--ambient-bg);
            background-size: var(--bg-size);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        .dock-container {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
        }

        .dock {
            display: flex;
            align-items: center;
            background: var(--dock-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--dock-border);
            padding: 0.5rem;
            border-radius: 100px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            transition: all 0.5s ease;
            direction: ltr;
        }

        .dock-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--dock-icon-inactive);
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: color 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dock-btn.active { color: var(--dock-icon); }

        .dock-indicator {
            position: absolute;
            left: 0.5rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--dock-indicator);
            z-index: 1;
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.5s, border-radius 0.5s;
            transform: translateX(calc(var(--active-idx,0) * 52px));
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 3rem 2rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .brand-text { transition: all 0.5s ease; }

        [data-theme="dark"] .brand-text {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(140deg, #ffffff 0%, #cdd1ff 40%, #7a88ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.04em;
            filter: drop-shadow(0 0 35px rgba(122,136,255,0.55));
        }

        [data-theme="light"] .brand-text {
            font-family: 'Alexandria', sans-serif;
            font-weight: 900;
            font-size: 4.5rem;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 4px 4px 0 #c0392b, 8px 8px 0 rgba(192,57,43,0.2);
            transform: rotate(-1.5deg);
            display: inline-block;
        }

        [data-theme="neomorph"] .brand-text {
            font-family: 'Almarai', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: #3a5068;
            text-shadow: 4px 4px 10px #bdc8d4, -3px -3px 8px #fbfeff;
            letter-spacing: 3px;
        }

        [data-theme="terminal"] .brand-text {
            font-family: 'Space Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            color: #c4b5fd;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow:
                -3px 0 rgba(251,146,60,0.75),
                3px 0 rgba(129,140,248,0.55),
                0 0 28px rgba(196,181,253,0.35);
            animation: glitchPulse 5s ease-in-out infinite;
        }

        [data-theme="terminal"] .brand-text::before {
            content: "// ";
            color: rgba(251,146,60,0.5);
            letter-spacing: 2px;
            font-size: 0.82em;
        }

        [data-theme="terminal"] .brand-text::after {
            content: "▮";
            color: rgba(196,181,253,0.65);
            animation: cursorBlink 0.9s step-end infinite;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes glitchPulse {
            0%, 78%, 100% {
                text-shadow: -3px 0 rgba(251,146,60,0.75), 3px 0 rgba(129,140,248,0.55), 0 0 28px rgba(196,181,253,0.35);
                transform: none;
            }
            81% {
                text-shadow: -7px 0 rgba(251,146,60,0.95), 7px 0 rgba(129,140,248,0.9), 0 0 50px rgba(255,255,255,0.15);
                transform: translateX(4px) skewX(-1deg);
            }
            84% {
                text-shadow: 5px 0 rgba(251,146,60,0.9), -5px 0 rgba(129,140,248,0.9);
                transform: translateX(-3px) skewX(0.5deg);
            }
            87% {
                text-shadow: -3px 0 rgba(251,146,60,0.75), 3px 0 rgba(129,140,248,0.55), 0 0 28px rgba(196,181,253,0.35);
                transform: none;
            }
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem 2rem;
            position: relative;
            z-index: 10;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
        }

        .app {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-card);
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
            display: flex;
            isolation: isolate;
        }

        .app-content {
            padding: 2.2rem;
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            z-index: 2;
        }

        .app-icon {
            font-size: 2.5rem;
            color: var(--text-muted);
            transition: all 0.4s ease;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: var(--icon-bg);
            flex-shrink: 0;
        }

        .app-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.5rem;
        }

        .app-name {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.3;
            transition: color 0.3s ease;
        }

        .b-large { grid-column: span 2; grid-row: span 2; }
        .b-large .app-content { flex-direction: column; justify-content: space-between; }
        .b-large .app-icon { font-size: 3.5rem; width: 70px; height: 70px; color: var(--text-main); }
        .b-large .app-name { font-size: 2.2rem; }

        .b-wide { grid-column: span 2; grid-row: span 1; }
        .b-wide .app-content { flex-direction: row; align-items: center; gap: 1.5rem; }

        .b-tall { grid-column: span 1; grid-row: span 2; }
        .b-tall .app-content { flex-direction: column; justify-content: space-between; }
        .b-tall .app-icon { font-size: 3rem; width: 60px; height: 60px; }

        .b-std { grid-column: span 1; grid-row: span 1; }
        .b-std .app-content { flex-direction: column; justify-content: space-between; }
        .b-std .app-icon { font-size: 1.8rem; width: 45px; height: 45px; }

        [data-theme="dark"] .app {
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        [data-theme="dark"] .app::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(800px circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(255,255,255,0.06), transparent 40%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
            pointer-events: none;
        }

        [data-theme="dark"] .app:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        [data-theme="dark"] .app:hover::before { opacity: 1; }
        [data-theme="dark"] .app:hover .app-icon { color: var(--accent); transform: scale(1.1); }

        [data-theme="light"] .dock {
            border: 2px solid #1a1a1a;
            box-shadow: 3px 3px 0px #1a1a1a;
            border-radius: 100px;
        }

        [data-theme="light"] .dock-indicator { background: #c0392b; }

        [data-theme="light"] .app {
            border: 2px solid #1a1a1a;
        }

        [data-theme="light"] .app-icon {
            border: 1.5px solid #1a1a1a;
            box-shadow: 2px 2px 0px #1a1a1a;
            background: #ede8da;
            color: #1a1a1a;
            border-radius: 6px;
        }

        [data-theme="light"] .app:hover {
            transform: translate(-4px,-4px);
            box-shadow: 9px 9px 0px #c0392b;
        }

        [data-theme="light"] .app:hover .app-icon {
            background: #c0392b;
            color: #faf7f2;
            box-shadow: 2px 2px 0px #1a1a1a;
        }

        [data-theme="light"] .app:hover .app-name { color: #c0392b; }

        [data-theme="neomorph"] .app:hover {
            box-shadow: inset 8px 8px 18px #bdc8d4, inset -8px -8px 18px #fbfeff;
            transform: scale(0.98);
        }

        [data-theme="neomorph"] .app:hover .app-icon { color: var(--accent); }

        [data-theme="neomorph"] .dock-indicator {
            box-shadow: inset 4px 4px 8px #bdc8d4, inset -4px -4px 8px #fbfeff;
        }

        [data-theme="terminal"] .dock {
            border-radius: 0;
            padding: 0;
            border: 1px solid rgba(167,139,250,0.28);
            box-shadow: 0 0 24px rgba(167,139,250,0.07);
        }

        [data-theme="terminal"] .dock-indicator { border-radius: 0; left: 0; }
        [data-theme="terminal"] .dock-btn { border-radius: 0; }

        [data-theme="terminal"] .dock-btn.active {
            color: #a78bfa;
            text-shadow: 0 0 12px rgba(167,139,250,0.85), 0 0 4px rgba(251,146,60,0.4);
        }

        [data-theme="terminal"] .app-icon {
            border-radius: 0;
            border: 1px solid rgba(167,139,250,0.14);
        }

        [data-theme="terminal"] .app:hover {
            background: rgba(167,139,250,0.035);
            border-color: rgba(167,139,250,0.42);
            box-shadow: 0 0 30px rgba(167,139,250,0.1), -1px 0 0 rgba(251,146,60,0.28);
        }

        [data-theme="terminal"] .app:hover .app-icon {
            background: rgba(167,139,250,0.1);
            color: #a78bfa;
            border-color: rgba(167,139,250,0.45);
            box-shadow: 0 0 16px rgba(167,139,250,0.3), -2px 0 8px rgba(251,146,60,0.25);
        }

        [data-theme="terminal"] .app:hover .app-name { color: #c4b5fd; }

        @media (min-width: 1025px) {
            body { height: 100vh; overflow: hidden; }
            main { flex: 1; display: flex; align-items: center; justify-content: center; }
            .bento-grid { width: 100%; height: 100%; max-height: 640px; grid-template-rows: repeat(4,1fr); }
        }

        @media (max-width: 1024px) {
            .bento-grid { grid-template-columns: repeat(3,1fr); grid-auto-rows: 160px; }
            main { padding-bottom: 6rem; }
        }

        @media (max-width: 768px) {
            header { padding: 8rem 2rem 3rem; }
            .bento-grid { grid-template-columns: repeat(2,1fr); }
            .b-large { grid-column: span 2; grid-row: span 2; }
            .b-wide { grid-column: span 2; grid-row: span 1; }
            .b-tall { grid-column: span 1; grid-row: span 1; }
            .b-tall .app-content { flex-direction: row; align-items: center; gap: 1.5rem; }
            .b-tall .app-icon { width: 50px; height: 50px; font-size: 2rem; }
            [data-theme="dark"] .brand-text { font-size: 2.8rem; }
            [data-theme="light"] .brand-text { font-size: clamp(2.4rem, 7vw, 3rem); }
            [data-theme="terminal"] .brand-text { font-size: 2rem; letter-spacing: 3px; }
        }

        @media (max-width: 480px) {
            .dock-container { top: 1.5rem; left: 1rem; }
            header { padding: 7rem 1rem 2rem; }
            main { padding: 0 1rem 4rem; }
            .bento-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
            .b-large, .b-wide, .b-tall, .b-std { grid-column: span 1; grid-row: span 1; }
            .app-content { flex-direction: row !important; padding: 1.5rem !important; gap: 1.2rem !important; }
            .app-icon { width: 45px !important; height: 45px !important; font-size: 1.6rem !important; }
            .b-large .app-name { font-size: 1.5rem; }
            .dock-btn, .dock-indicator { width: 42px; height: 42px; font-size: 1rem; }
            .dock-indicator { transform: translateX(calc(var(--active-idx,0) * 42px)); }
            [data-theme="terminal"] .brand-text::before { content: "// "; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="dock-container">
        <nav class="dock" id="theme-dock">
            <div class="dock-indicator"></div>
            <button class="dock-btn active" data-idx="0" data-theme-val="dark"><i class="fas fa-moon"></i></button>
            <button class="dock-btn" data-idx="1" data-theme-val="light"><i class="fas fa-sun"></i></button>
            <button class="dock-btn" data-idx="2" data-theme-val="neomorph"><i class="fas fa-layer-group"></i></button>
            <button class="dock-btn" data-idx="3" data-theme-val="terminal"><i class="fas fa-terminal"></i></button>
        </nav>
    </div>
    <header>
        <h1 class="brand-text">LinkExpress</h1>
    </header>
    <main>
        <div class="bento-grid">
            <a href="https://lx-index.vercel.app/" class="app b-large" target="_blank" rel="noopener noreferrer">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-book-medical"></i></div>
                    <div class="app-details">
                        <div class="app-name">فهرس الادوية</div>
                    </div>
                </div>
            </a>
            <a href="https://menu2-six.vercel.app/" class="app b-wide" target="_blank" rel="noopener noreferrer">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-pills"></i></div>
                    <div class="app-details">
                        <div class="app-name">مجموعات دوائية</div>
                    </div>
                </div>
            </a>
            <a href="https://datakid-github-io.vercel.app/" class="app b-std" target="_blank" rel="noopener noreferrer">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-briefcase-medical"></i></div>
                    <div class="app-details">
                        <div class="app-name">خارجي 1</div>
                    </div>
                </div>
            </a>
            <a href="https://searchbar-five-beta.vercel.app/" class="app b-tall" target="_blank" rel="noopener noreferrer">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-search"></i></div>
                    <div class="app-details">
                        <div class="app-name">لستة الادوية</div>
                    </div>
                </div>
            </a>
            <a href="https://protocols-one.vercel.app/" class="app b-wide" target="_blank" rel="noopener noreferrer">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-folder-open"></i></div>
                    <div class="app-details">
                        <div class="app-name">بروتوكولات التأمين</div>
                    </div>
                </div>
            </a>
            <a href="https://datakid2.vercel.app/" class="app b-std" target="_blank" rel="noopener noreferrer">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-graduation-cap"></i></div>
                    <div class="app-details">
                        <div class="app-name">خارجي 3</div>
                    </div>
                </div>
            </a>
            <a class="app b-wide" id="dual-link-1" style="cursor:pointer;">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-dollar-sign"></i></div>
                    <div class="app-details">
                        <div class="app-name">المنفذ والتحمل</div>
                    </div>
                </div>
            </a>
            <a href="https://simpledashboard21.netlify.app/" class="app b-wide" target="_blank" rel="noopener noreferrer">
                <div class="app-content">
                    <div class="app-icon"><i class="fas fa-eye"></i></div>
                    <div class="app-details">
                        <div class="app-name">بيانات الخارجي</div>
                    </div>
                </div>
            </a>
        </div>
    </main>
    <script>
        const body = document.body;
        const dock = document.getElementById('theme-dock');
        const buttons = document.querySelectorAll('.dock-btn');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                body.setAttribute('data-theme', btn.getAttribute('data-theme-val'));
                dock.style.setProperty('--active-idx', btn.getAttribute('data-idx'));
            });
        });

        document.querySelectorAll('.app').forEach(app => {
            app.addEventListener('mousemove', e => {
                if (body.getAttribute('data-theme') !== 'dark') return;
                const rect = app.getBoundingClientRect();
                app.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                app.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
        });

        const dualUrls = ['https://newlist2.vercel.app/', 'https://newlist-eta.vercel.app/'];
        document.getElementById('dual-link-1').addEventListener('click', () => {
            window.open(dualUrls[Math.floor(Math.random() * dualUrls.length)], '_blank', 'noopener,noreferrer');
        });
    </script>
</body>
</html>
