<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkExpress Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;800;900&family=Bangers&family=Cairo:wght@400;700;800&family=Outfit:wght@300;500;800&family=Syncopate:wght@700&family=Limelight&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        [data-theme="cyber"] {
            --font-main: 'Alexandria', sans-serif;
            --font-title: 'Outfit', sans-serif;
            --bg: #030305;
            --card-bg: rgba(20, 20, 25, 0.5);
            --text-main: #ffffff;
            --text-sec: #8a8a99;
            --accent: #00f0ff;
            --border: 1px solid rgba(255, 255, 255, 0.08);
            --radius: 28px;
            --shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            --hover-trans: translateY(-6px) scale(1.01);
            --ambient: radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.08) 0%, transparent 60%);
            --dock-bg: rgba(10, 10, 12, 0.7);
            --dock-border: rgba(255, 255, 255, 0.1);
            --indicator: rgba(0, 240, 255, 0.15);
        }

        [data-theme="comic"] {
            --font-main: 'Alexandria', sans-serif;
            --font-title: 'Limelight', cursive;
            --bg: #f4ebd8;
            --card-bg: #fffcf5;
            --text-main: #2c2825;
            --text-sec: #5e554d;
            --accent: #d9382e;
            --accent-alt: #ebd197;
            --border: 3px solid #2c2825;
            --radius: 24px;
            --shadow: 6px 6px 0px rgba(44, 40, 37, 0.15);
            --hover-trans: translate(-4px, -4px) rotate(-1deg);
            --ambient: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.05) 100%);
            --dock-bg: #fffcf5;
            --dock-border: #2c2825;
            --indicator: #ebd197;
        }

        [data-theme="glitch"] {
            --font-main: 'Alexandria', sans-serif;
            --font-title: 'Syncopate', sans-serif;
            --bg: #03010a;
            --card-bg: rgba(10, 5, 25, 0.7);
            --text-main: #e0f2fe;
            --text-sec: #94a3b8;
            --accent: #ff0055;
            --accent-alt: #00f0ff;
            --border: 1px solid rgba(0, 240, 255, 0.2);
            --radius: 0px;
            --shadow: 0 0 20px rgba(0, 240, 255, 0.05);
            --hover-trans: translate(3px, -3px);
            --ambient: 
                radial-gradient(circle at 10% 40%, rgba(255, 0, 85, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 90% 60%, rgba(0, 240, 255, 0.12) 0%, transparent 50%);
            --dock-bg: #03010a;
            --dock-border: rgba(0, 240, 255, 0.5);
            --indicator: rgba(255, 0, 85, 0.2);
        }

        [data-theme="neo"] {
            --font-main: 'Cairo', sans-serif;
            --font-title: 'Cairo', sans-serif;
            --bg: #e0e5ec;
            --card-bg: #e0e5ec;
            --text-main: #4a5568;
            --text-sec: #718096;
            --accent: #4299e1;
            --border: 1px solid transparent;
            --radius: 36px;
            --shadow: 12px 12px 24px rgba(163,177,198,0.7), -12px -12px 24px rgba(255,255,255,0.6);
            --hover-trans: scale(0.98);
            --ambient: none;
            --dock-bg: #e0e5ec;
            --dock-border: transparent;
            --indicator: #e0e5ec;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            background-image: var(--ambient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.7s var(--ease-out-expo), color 0.7s;
            overflow-x: hidden;
            position: relative;
        }

        .film-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.5s;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }

        .film-lines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            background: linear-gradient(90deg, transparent 50%, rgba(0,0,0,0.02) 50%);
            background-size: 4px 100%;
            animation: jitter 0.3s infinite;
        }

        [data-theme="comic"] .film-overlay,
        [data-theme="comic"] .film-lines {
            opacity: 1;
        }

        .glitch-scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.25) 51%);
            background-size: 100% 4px;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        [data-theme="glitch"] .glitch-scanlines {
            opacity: 1;
        }

        @keyframes jitter {
            0% { transform: translateX(0); }
            50% { transform: translateX(1px); }
            100% { transform: translateX(0); }
        }

        .dock-wrapper {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 10000;
        }

        .dock {
            display: flex;
            align-items: center;
            background: var(--dock-bg);
            border: var(--border);
            padding: 0.5rem;
            border-radius: 100px;
            position: relative;
            box-shadow: var(--shadow);
            transition: all 0.6s var(--ease-out-expo);
            direction: ltr;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        [data-theme="glitch"] .dock { border-radius: 0; border: 1px solid var(--accent-alt); backdrop-filter: none; }
        [data-theme="comic"] .dock { border-radius: 40px; box-shadow: 4px 4px 0px var(--text-main); backdrop-filter: none; }
        [data-theme="neo"] .dock { box-shadow: 9px 9px 16px rgba(163,177,198,0.6), -9px -9px 16px rgba(255,255,255,0.5); backdrop-filter: none; }

        .dock-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-sec);
            font-size: 1.1rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: color 0.3s, transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dock-btn:hover { transform: scale(1.1); }
        .dock-btn.active { color: var(--text-main); }
        
        [data-theme="cyber"] .dock-btn.active { color: var(--accent); }
        [data-theme="glitch"] .dock-btn.active { color: var(--accent-alt); text-shadow: 0 0 8px var(--accent-alt); }
        [data-theme="comic"] .dock-btn.active { color: var(--accent); }
        [data-theme="neo"] .dock-btn.active { color: var(--accent); }

        .dock-indicator {
            position: absolute;
            left: 0.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--indicator);
            z-index: 1;
            transition: transform 0.6s var(--ease-elastic), background 0.4s, border-radius 0.4s;
            transform: translateX(calc(var(--active-idx, 0) * 50px));
        }

        [data-theme="glitch"] .dock-indicator { border-radius: 0; border: 1px solid var(--accent); background: rgba(255,0,85,0.1); }
        [data-theme="comic"] .dock-indicator { border-radius: 50%; border: 2px solid var(--text-main); }
        [data-theme="neo"] .dock-indicator { box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255,0.5); }

        header {
            width: 100%;
            max-width: 1400px;
            padding: 4rem 2rem 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .brand-text {
            font-family: var(--font-title);
            font-size: clamp(3rem, 5vw, 4.5rem);
            transition: all 0.6s var(--ease-out-expo);
            position: relative;
            z-index: 1;
        }

        [data-theme="cyber"] .brand-text {
            font-weight: 800;
            background: linear-gradient(180deg, #fff 0%, #8a8a99 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.3));
        }

        [data-theme="comic"] .brand-text {
            color: var(--accent);
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #fffcf5, 4px 4px 0px var(--text-main);
            transform: rotate(-3deg);
            animation: bounce 3s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            50% { transform: rotate(-1deg) translateY(-8px); }
        }

        [data-theme="glitch"] .brand-text {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                -3px 0px 0px var(--accent),
                3px 0px 0px var(--accent-alt);
            animation: glitch-anim 4s infinite linear alternate-reverse;
        }

        [data-theme="glitch"] .brand-text::before,
        [data-theme="glitch"] .brand-text::after {
            content: "LinkExpress";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        [data-theme="glitch"] .brand-text::before {
            color: var(--accent-alt);
            z-index: -1;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-3px, 2px);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        [data-theme="glitch"] .brand-text::after {
            color: var(--accent);
            z-index: -2;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            transform: translate(3px, -2px);
            animation: glitch-anim-3 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0%, 100% { transform: skew(0deg); text-shadow: -3px 0 var(--accent), 3px 0 var(--accent-alt); }
            2% { transform: skew(-5deg); text-shadow: -5px 0 var(--accent), 5px 0 var(--accent-alt); }
            4% { transform: skew(0deg); }
        }
        @keyframes glitch-anim-2 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
        }
        @keyframes glitch-anim-3 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(3px, -2px); }
            40% { transform: translate(-3px, 2px); }
        }

        [data-theme="neo"] .brand-text {
            font-weight: 800;
            color: var(--text-main);
            text-shadow: 4px 4px 8px rgba(163,177,198,0.5), -4px -4px 8px rgba(255,255,255,0.8);
            letter-spacing: -1px;
        }

        main {
            width: 100%;
            max-width: 1400px;
            padding: 0 2rem 4rem;
            z-index: 10;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            width: 100%;
            transition: all 0.6s var(--ease-out-expo);
        }

        .card {
            background: var(--card-bg);
            border: var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
            transition: all 0.4s var(--ease-out-expo);
            display: flex;
            flex-direction: column;
            isolation: isolate;
            min-height: 160px;
        }

        .c-content {
            padding: 2.2rem;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .c-icon {
            font-size: 2.2rem;
            color: var(--text-sec);
            transition: all 0.3s var(--ease-out-expo);
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .c-title {
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1.3;
            transition: color 0.3s;
        }

        .c-large { grid-column: span 2; grid-row: span 2; min-height: 344px; }
        .c-large .c-icon { font-size: 4rem; margin-bottom: auto; }
        .c-large .c-title { font-size: 2.5rem; }

        .c-wide { grid-column: span 2; grid-row: span 1; }
        .c-wide .c-content { flex-direction: row; align-items: center; justify-content: flex-start; gap: 2rem; }
        .c-wide .c-icon { margin-bottom: 0; font-size: 2.5rem; }

        .c-tall { grid-column: span 1; grid-row: span 2; min-height: 344px; }
        .c-tall .c-icon { font-size: 3rem; margin-bottom: auto; }

        [data-theme="cyber"] .card {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        [data-theme="cyber"] .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(0, 240, 255, 0.1), transparent 40%);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: 1;
            pointer-events: none;
        }
        [data-theme="cyber"] .card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: var(--hover-trans);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(0,240,255,0.1);
        }
        [data-theme="cyber"] .card:hover::before { opacity: 1; }
        [data-theme="cyber"] .card:hover .c-icon { color: var(--accent); transform: scale(1.1); }
        [data-theme="cyber"] .card:hover .c-title { color: #fff; }

        [data-theme="comic"] .card {
            background-image: radial-gradient(var(--accent-alt) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0;
            background-color: var(--card-bg);
        }
        [data-theme="comic"] .card:hover {
            transform: var(--hover-trans);
            box-shadow: 10px 10px 0px var(--text-main);
            background-color: #fff;
            border-color: var(--text-main);
        }
        [data-theme="comic"] .c-icon { color: var(--text-main); }
        [data-theme="comic"] .card:hover .c-icon { 
            color: var(--accent); 
            transform: scale(1.2) rotate(8deg); 
        }
        [data-theme="comic"] .grid {
            grid-template-areas: 
                "large large std1 tall"
                "large large wide1 tall"
                "wide2 wide2 std2 std3";
        }
        [data-theme="comic"] .card:nth-child(1) { grid-area: large; border-radius: 30px 15px 40px 20px; }
        [data-theme="comic"] .card:nth-child(2) { grid-area: wide1; border-radius: 15px 30px 20px 40px; }
        [data-theme="comic"] .card:nth-child(3) { grid-area: std1; border-radius: 40px 20px 30px 15px; }
        [data-theme="comic"] .card:nth-child(4) { grid-area: tall; border-radius: 20px 40px 15px 30px; }
        [data-theme="comic"] .card:nth-child(5) { grid-area: wide2; border-radius: 30px 20px 40px 15px; }
        [data-theme="comic"] .card:nth-child(6) { grid-area: std2; border-radius: 15px 40px 20px 30px; }
        [data-theme="comic"] .card:nth-child(7) { grid-area: std3; border-radius: 40px 15px 30px 20px; }
        [data-theme="comic"] .card:nth-child(8) { display: none; }

        [data-theme="glitch"] .card {
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 240, 255, 0.02) 10px, rgba(0, 240, 255, 0.02) 20px), var(--card-bg);
            border-left: 2px solid var(--accent-alt);
        }
        [data-theme="glitch"] .card:hover {
            transform: var(--hover-trans);
            border-color: rgba(255,0,85,0.5);
            border-left: 4px solid var(--accent);
            box-shadow: -5px 0px 15px rgba(255,0,85,0.2), 5px 0px 15px rgba(0,240,255,0.2);
        }
        [data-theme="glitch"] .card:hover .c-icon, [data-theme="glitch"] .card:hover .c-title {
            color: #fff;
            text-shadow: 2px 0 var(--accent-alt), -2px 0 var(--accent);
        }
        [data-theme="glitch"] .card::after {
            content: ''; position: absolute; inset: 0; background: rgba(255,0,85,0.05); opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        [data-theme="glitch"] .card:hover::after { opacity: 1; animation: flash 0.15s infinite alternate; }
        @keyframes flash { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }

        [data-theme="neo"] .card {
            background: linear-gradient(145deg, #f0f5fc, #caced7);
        }
        [data-theme="neo"] .c-icon { color: var(--accent); }
        [data-theme="neo"] .card:hover {
            transform: var(--hover-trans);
            background: #e0e5ec;
            box-shadow: inset 12px 12px 24px rgba(163,177,198,0.8), inset -12px -12px 24px rgba(255,255,255,0.9);
        }
        [data-theme="neo"] .card:hover .c-icon { transform: scale(0.95); }
        [data-theme="neo"] .card:hover .c-title { color: var(--accent); }

        @media (min-width: 1025px) {
            body { height: 100vh; overflow: hidden; }
            main { flex: 1; display: flex; align-items: center; justify-content: center; }
            .grid { height: 100%; max-height: 720px; }
            [data-theme="cyber"] .grid, [data-theme="glitch"] .grid, [data-theme="neo"] .grid {
                grid-template-rows: repeat(3, 1fr);
            }
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); display: flex; flex-direction: column; }
            .c-large, .c-wide, .c-tall { grid-column: span 1; grid-row: span 1; min-height: 140px; }
            .c-content { flex-direction: row; align-items: center; gap: 1.5rem; padding: 1.5rem; }
            .c-icon { margin-bottom: 0; font-size: 2rem; }
            .c-large .c-icon, .c-tall .c-icon { font-size: 2rem; }
            .c-large .c-title { font-size: 1.6rem; }
            [data-theme="comic"] .grid { display: flex; flex-direction: column; }
            [data-theme="comic"] .card { border-radius: 20px !important; }
            [data-theme="comic"] .card:nth-child(8) { display: flex; }
        }

        @media (max-width: 600px) {
            header { padding: 6rem 1.5rem 2rem; }
            .brand-text { font-size: 2.5rem; }
            .dock-wrapper { top: 1rem; left: 1rem; }
            .dock-btn, .dock-indicator { width: 42px; height: 42px; font-size: 1rem; }
            .dock-indicator { transform: translateX(calc(var(--active-idx, 0) * 42px)); }
            .c-content { padding: 1.2rem; gap: 1rem; }
            .c-title { font-size: 1.2rem; }
        }
    </style>
</head>

                </div>
            </a>

            <a class="card c-std" id="dual-link" style="cursor:pointer;">
                <div class="c-content">
                    <div class="c-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                    <h2 class="c-title">المنفذ والتحمل</h2>
                </div>
            </a>

            <a href="https://simpledashboard21.netlify.app/" class="card c-std" target="_blank" rel="noopener noreferrer">
                <div class="c-content">
                    <div class="c-icon"><i class="fas fa-chart-pie"></i></div>
                    <h2 class="c-title">بيانات الخارجي</h2>
                </div>
            </a>
        </div>
    </main>

    <script>
        const body = document.body;
        const dock = document.getElementById('theme-dock');
        const buttons = document.querySelectorAll('.dock-btn');
        const cards = document.querySelectorAll('.card');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                body.setAttribute('data-theme', btn.getAttribute('data-theme-val'));
                dock.style.setProperty('--active-idx', btn.getAttribute('data-idx'));
            });
        });

        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                if (body.getAttribute('data-theme') !== 'cyber') return;
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
        });

        const dualUrls = ['https://newlist2.vercel.app/', 'https://newlist-eta.vercel.app/'];
        document.getElementById('dual-link').addEventListener('click', () => {
            window.open(dualUrls[Math.floor(Math.random() * dualUrls.length)], '_blank', 'noopener,noreferrer');
        });
    </script>
</body>
</html>
